<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Offline</title>
		<style>
			body {
				margin: 0;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				display: grid;
				place-items: center;
				min-height: 100vh;
				background: #f5f7fb;
				color: #111827;
			}
			.card {
				max-width: 420px;
				padding: 24px;
				border-radius: 16px;
				border: 1px solid #d1d5db;
				background: #ffffff;
			}
			h1 {
				margin: 0 0 8px;
				font-size: 1.5rem;
			}
			p {
				margin: 0;
				line-height: 1.5;
				color: #4b5563;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>You're offline</h1>
			<p>The app will reconnect automatically. If you've opened Notes before, your local notes should still be available.</p>
		</div>
	</body>
</html>
